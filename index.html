<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #000000;
    }

    header {
      padding: 30px;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
      padding: 40px;
    }

    .item {
      text-align: center;
    }

    .item img {
      width: 100%;
      height: auto;
      border-radius: 4px;
    }

    .item p {
      margin-top: 8px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <header>My Portfolio</header>

  <div class="grid">

    <!-- Exemplu: înlocuiește cu imaginile tale -->

     <div class="item">
      <img src="1 eMyArt(My Art Is My Life!).png" alt="">
      <p>1 eMyArt(My Art Is My Life!).png</p>
    </div>
     <div class="item">
      <img src="2 eTheFoxTrickedByTheRaven.png" alt="">
      <p>2 eTheFoxTrickedByTheRaven.png</p>
    </div>
     <div class="item">
      <img src="3 eEmptyMoon.png" alt="">
      <p>3 eEmptyMoon.png</p>
    </div>
    
    <div class="item">
      <img src="19_eAbstractNude.jpg" alt="">
      <p>19_eAbstractNude.jpg</p>
    </div>

    <div class="item">
      <img src="14_eNirvanaSmell.png" alt="">
      <p>14_eNirvanaSmell.png</p>
    </div>

    <div class="item">
      <img src="11_eEagle.gif" alt="">
      <p>11_eEagle.gif</p>
    </div>

  </div>

</body>
</html>
